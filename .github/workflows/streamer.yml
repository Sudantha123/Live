name: Streamer

on:
  workflow_dispatch: # Manual trigger from GitHub UI
  schedule:
    - cron: '0 * * * *' # Runs every hour
  push:
    branches:
      - main

jobs:
  run-stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.RTMP_URL }}" ]; then
            echo "ERROR: RTMP_URL secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.M3U8_URL }}" ]; then
            echo "ERROR: M3U8_URL secret is not set"
            exit 1
          fi
          echo "✓ All secrets are configured"

      - name: Start Streaming
        env:
          RTMP_URL: ${{ secrets.RTMP_URL }}
          M3U8_URL: ${{ secrets.M3U8_URL }}
        run: |
          ffmpeg -re -i "$M3U8_URL" \
          -vf "split[v1][v2];[v1]scale=480:854:force_original_aspect_ratio=increase,crop=480:854,boxblur=10:5[bg];[v2]scale=480:-1[fg];[bg][fg]overlay=(W-w)/2:(H-h)/2" \
          -c:v libx264 -preset ultrafast -b:v 2000k -maxrate 2000k -bufsize 4000k \
          -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k \
          -f flv "$RTMP_URL"

      - name: Notify on failure
        if: failure()
        run: echo "Streaming failed. Check logs for details."
