name: Streamer

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Starter"]
    types:
      - completed

jobs:
  run-stream:
    runs-on: ubuntu-latest
    # Starter එක සාර්ථක වුණොත් හෝ අපි අතින් පටන් ගත්තොත් පමණක් පණගැන්වේ
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: '6.0'

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.RTMP_URL }}" ]; then echo "ERROR: RTMP_URL not set"; exit 1; fi
          if [ -z "${{ secrets.M3U8_URL }}" ]; then echo "ERROR: M3U8_URL not set"; exit 1; fi

      - name: Start Streaming
        env:
          RTMP_URL: ${{ secrets.RTMP_URL }}
          M3U8_URL: ${{ secrets.M3U8_URL }}
        run: |
          ffmpeg -re -i "$M3U8_URL" \
          -vf "scale=720:1280:force_original_aspect_ratio=decrease,pad=720:1280:(ow-iw)/2:(oh-ih)/2:black" \
          -c:v libx264 -preset ultrafast -b:v 2000k -maxrate 2000k -bufsize 4000k \
          -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k \
          -f flv "$RTMP_URL"

      - name: Notify on failure
        if: failure()
        run: echo "Streaming failed."
        
